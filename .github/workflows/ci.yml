name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-order-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./services/order-service
        run: npm ci
      
      - name: Lint
        working-directory: ./services/order-service
        run: npm run lint || echo "No lint script"

  test-inventory-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./services/inventory-service
        run: |
          pip install -r requirements.txt
          pip install pytest flake8
      
      - name: Lint
        working-directory: ./services/inventory-service
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

  build-images:
    runs-on: ubuntu-latest
    needs: [test-order-service, test-inventory-service]
    strategy:
      matrix:
        service: [order-service, inventory-service, notify-service, ai-agent-service, api-gateway]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker image
        working-directory: ./services/${{ matrix.service }}
        run: docker build -t pulseshield/${{ matrix.service }}:${{ github.sha }} .
      
      - name: Test Docker image
        run: docker run --rm pulseshield/${{ matrix.service }}:${{ github.sha }} echo "Image built successfully"
