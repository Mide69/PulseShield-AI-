apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.notifyService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.notifyService.name }}
spec:
  replicas: {{ .Values.notifyService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.notifyService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.notifyService.name }}
    spec:
      containers:
      - name: {{ .Values.notifyService.name }}
        image: {{ .Values.global.registry }}/{{ .Values.notifyService.image }}:{{ .Values.notifyService.tag }}
        ports:
        - containerPort: {{ .Values.notifyService.port }}
        env:
        - name: PORT
          value: "{{ .Values.notifyService.port }}"
        resources:
          requests:
            cpu: {{ .Values.notifyService.resources.requests.cpu }}
            memory: {{ .Values.notifyService.resources.requests.memory }}
          limits:
            cpu: {{ .Values.notifyService.resources.limits.cpu }}
            memory: {{ .Values.notifyService.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.notifyService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.notifyService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.notifyService.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.notifyService.name }}
  ports:
  - port: {{ .Values.notifyService.port }}
    targetPort: {{ .Values.notifyService.port }}
  type: ClusterIP
