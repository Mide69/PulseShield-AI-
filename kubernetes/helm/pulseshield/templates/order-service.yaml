apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.orderService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.orderService.name }}
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.orderService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.orderService.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.orderService.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: {{ .Values.orderService.name }}
        image: {{ .Values.global.registry }}/{{ .Values.orderService.image }}:{{ .Values.orderService.tag }}
        ports:
        - containerPort: {{ .Values.orderService.port }}
        env:
        - name: PORT
          value: "{{ .Values.orderService.port }}"
        - name: DB_HOST
          value: {{ .Values.database.host }}
        - name: DB_NAME
          value: {{ .Values.database.name }}
        - name: DB_USER
          value: {{ .Values.database.user }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pulseshield-secrets
              key: db-password
        resources:
          requests:
            cpu: {{ .Values.orderService.resources.requests.cpu }}
            memory: {{ .Values.orderService.resources.requests.memory }}
          limits:
            cpu: {{ .Values.orderService.resources.limits.cpu }}
            memory: {{ .Values.orderService.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.orderService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.orderService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.orderService.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.orderService.name }}
  ports:
  - port: {{ .Values.orderService.port }}
    targetPort: {{ .Values.orderService.port }}
  type: ClusterIP
---
{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.orderService.name }}-hpa
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.orderService.name }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.hpa.targetCPU }}
{{- end }}
