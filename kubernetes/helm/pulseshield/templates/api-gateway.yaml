apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.apiGateway.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.apiGateway.name }}
spec:
  replicas: {{ .Values.apiGateway.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.apiGateway.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.apiGateway.name }}
    spec:
      containers:
      - name: {{ .Values.apiGateway.name }}
        image: {{ .Values.global.registry }}/{{ .Values.apiGateway.image }}:{{ .Values.apiGateway.tag }}
        ports:
        - containerPort: {{ .Values.apiGateway.port }}
        resources:
          requests:
            cpu: {{ .Values.apiGateway.resources.requests.cpu }}
            memory: {{ .Values.apiGateway.resources.requests.memory }}
          limits:
            cpu: {{ .Values.apiGateway.resources.limits.cpu }}
            memory: {{ .Values.apiGateway.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.apiGateway.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.apiGateway.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.apiGateway.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.apiGateway.name }}
  ports:
  - port: 80
    targetPort: {{ .Values.apiGateway.port }}
  type: LoadBalancer
