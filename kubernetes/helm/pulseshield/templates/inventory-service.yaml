apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.inventoryService.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Values.inventoryService.name }}
spec:
  replicas: {{ .Values.inventoryService.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.inventoryService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.inventoryService.name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.inventoryService.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: {{ .Values.inventoryService.name }}
        image: {{ .Values.global.registry }}/{{ .Values.inventoryService.image }}:{{ .Values.inventoryService.tag }}
        ports:
        - containerPort: {{ .Values.inventoryService.port }}
        env:
        - name: PORT
          value: "{{ .Values.inventoryService.port }}"
        resources:
          requests:
            cpu: {{ .Values.inventoryService.resources.requests.cpu }}
            memory: {{ .Values.inventoryService.resources.requests.memory }}
          limits:
            cpu: {{ .Values.inventoryService.resources.limits.cpu }}
            memory: {{ .Values.inventoryService.resources.limits.memory }}
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.inventoryService.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.inventoryService.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.inventoryService.name }}
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: {{ .Values.inventoryService.name }}
  ports:
  - port: {{ .Values.inventoryService.port }}
    targetPort: {{ .Values.inventoryService.port }}
  type: ClusterIP
